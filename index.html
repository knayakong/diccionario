<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>El código</title>
<style>
  :root{
    --bg:#0d0b0c;
    --bg-card:#151113;
    --line:#2a2225;
    --ink:#ece7e4;
    --ink-soft:#8d8184;
    --rojo:#c8434b;
    --miel:#d9a441;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
    -webkit-font-smoothing:antialiased;
  }
  .hidden{display:none !important}

  /* spinner de carga */
  .staticrypt-spinner-container{display:flex;align-items:center;justify-content:center}
  .staticrypt-spinner{
    width:2rem;height:2rem;
    border:3px solid var(--line);
    border-top-color:var(--rojo);
    border-radius:50%;
    animation:giro .8s linear infinite;
  }
  @keyframes giro{to{transform:rotate(360deg)}}

  .staticrypt-page{width:100%;max-width:23rem;text-align:center}

  .oso{font-size:4rem;line-height:1;display:block;margin-bottom:1rem}
  .staticrypt-title{
    font-size:1.9rem;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:-.02em;
    margin-bottom:1rem;
  }
  .staticrypt-instructions p{
    color:var(--ink-soft);
    font-size:1rem;
    white-space:pre-line;
  }

  form{margin-top:2rem}
  .staticrypt-password-container{position:relative;display:flex;align-items:center}
  #staticrypt-password{
    width:100%;
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:.5rem;
    color:var(--ink);
    font-size:1.05rem;
    font-family:inherit;
    padding:.9rem 3rem .9rem 1rem;
    text-align:center;
    outline:none;
    transition:border-color .15s;
  }
  #staticrypt-password:focus{border-color:var(--rojo)}
  #staticrypt-password::placeholder{color:#5c5254}

  .staticrypt-toggle-password-visibility{
    position:absolute;
    right:1rem;
    width:1.15rem;
    cursor:pointer;
    opacity:.4;
    filter:invert(1);
    transition:opacity .15s;
  }
  .staticrypt-toggle-password-visibility:hover{opacity:.8}

  .staticrypt-decrypt-button{
    width:100%;
    margin-top:.75rem;
    background:var(--rojo);
    color:#fff;
    border:0;
    border-radius:.5rem;
    font-family:inherit;
    font-size:1rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.05em;
    padding:.9rem;
    cursor:pointer;
    transition:filter .15s;
  }
  .staticrypt-decrypt-button:hover{filter:brightness(1.15)}
  .staticrypt-decrypt-button:active{transform:translateY(1px)}

  .staticrypt-remember{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.5rem;
    margin-top:1rem;
    color:var(--ink-soft);
    font-size:.85rem;
    cursor:pointer;
  }
  .staticrypt-remember input{accent-color:var(--rojo);cursor:pointer}

  /* el error, en la página — no en una ventana gris del sistema */
  #staticrypt-error{
    margin-top:1rem;
    color:var(--miel);
    font-size:.9rem;
    min-height:1.2rem;
    white-space:pre-line;
  }

  @media (max-width:400px){
    .staticrypt-title{font-size:1.6rem}
    .oso{font-size:3.2rem}
  }
</style>
</head>
